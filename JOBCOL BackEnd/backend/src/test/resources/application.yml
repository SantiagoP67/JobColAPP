spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jobcol
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: false  

  kafka:
    bootstrap-servers: localhost:9092

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/JobCol

  mail:
    host: smtp.gmail.com
    port: 587
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

keycloak:
  url: http://localhost:8080
  realm: JobCol
  client-id: jobcol-client
  admin-user: admin
  admin-password: admin